    <!-- ===== BANDEAU SPONSORS DÉFILANT (CSS PUR) =====

         1. Ajoutez vos images dans assets/images/sponsors/
         2. Dupliquez un bloc <div class="sponsor-item"> dans CHAQUE groupe
            (groupe 1 ET groupe 2 doivent être identiques pour le loop infini)
         3. Remplacez src="..." par le chemin de votre image
         4. Ajustez la durée dans style.css : animation: sponsorScroll 20s
            (plus le nombre est grand, plus c'est lent)
    ===================================================== -->
    <div class="sponsors-bar">
      <div class="sponsors-label">Partenaires</div>
      <div class="sponsors-scroll-wrap">
        <div class="sponsors-track">

              class="sponsor-img"
              src="assets/images/sponsors/sponsor1.png"
              alt="Sponsor 1"
              onerror="
                this.style.display = 'none';
                this.nextElementSibling.style.display = 'flex';
              "
            />
            <div class="sponsor-img-fallback" style="display: none">SP1</div>
          </div>
