<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Championnat Alisabieh — 27 Juin 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- ===== EN-TÊTE ===== -->
    <header>
      <div class="header-flag-bar"></div>
      <div class="header-inner">
        <div class="header-logo-zone">
          <!-- LOGO CHAMPIONNAT — remplacer par votre image si besoin -->
          <svg
            class="logo-emblem"
            viewBox="0 0 64 64"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="32"
              cy="32"
              r="30"
              fill="#0F1F3D"
              stroke="#009EDB"
              stroke-width="2"
            />
            <polygon
              points="32,8 36,24 52,24 39,34 44,50 32,41 20,50 25,34 12,24 28,24"
              fill="#009EDB"
              opacity="0.15"
            />
            <polygon
              points="32,8 36,24 52,24 39,34 44,50 32,41 20,50 25,34 12,24 28,24"
              fill="none"
              stroke="#009EDB"
              stroke-width="1.5"
            />
            <circle
              cx="32"
              cy="32"
              r="10"
              fill="none"
              stroke="#007A3D"
              stroke-width="1.5"
            />
            <circle cx="32" cy="32" r="3" fill="#C8A96E" />
            <!-- Triangle drapeau Djibouti stylisé -->
            <polygon points="15,44 15,20 26,32" fill="#CE1126" opacity="0.7" />
            <text
              x="32"
              y="58"
              text-anchor="middle"
              font-family="Oswald"
              font-size="7"
              fill="#8BA3C0"
              letter-spacing="1"
            >
              ALISABIEH
            </text>
          </svg>

          <div class="header-titles">
            <h1>Championnat <span>Alisabieh</span></h1>
            <p>
              27 Juin 2026 &nbsp;·&nbsp; Région d'Alisabieh &nbsp;·&nbsp;
              Djibouti
            </p>
          </div>
        </div>

        <div class="header-date-badge">
          Édition
          <span>2026</span>
          Fête Nationale
        </div>
      </div>
    </header>

    <!-- ===== BANDEAU SPONSORS DÉFILANT ===== -->
    <!--
  PARTENAIRES & SPONSORS
  Pour modifier : éditez le tableau `sponsors` dans le script en bas de page.
  Chaque entrée : { name, shortName, type, color, bg }
-->
    <div class="sponsors-bar">
      <div class="sponsors-label">Partenaires</div>
      <div class="sponsors-scroll-wrap">
        <div class="sponsors-track" id="sponsorsTrack">
          <!-- Rempli par JS -->
        </div>
      </div>
    </div>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <main class="main-content">
      <!-- Navigation jours -->
      <div class="days-nav" id="daysNav">
        <!-- Rempli par JS -->
      </div>

      <!-- Sections par jour -->
      <div id="daysSections">
        <!-- Rempli par JS -->
      </div>
    </main>

    <!-- ===== PIED DE PAGE ===== -->
    <footer>
      <div class="footer-flag"></div>
      <p>
        <strong>Championnat Alisabieh 2026</strong> &nbsp;·&nbsp; Organisé à
        l'occasion de la Fête Nationale du 27 Juin &nbsp;·&nbsp; République de
        Djibouti
      </p>
    </footer>
    <script src="assets/js/index.js"></script>
  </body>
</html>
