<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Administration Championnat</title>
    <link rel="stylesheet" href="assets/css/admin.css">
  </head>

  <body>
    <h1>Administration Championnat Alisabieh</h1>

    <div class="card">
      <h2>Gestion des matchs</h2>

      <select id="matchSelect"></select>

      <input type="number" id="scoreHome" placeholder="Score domicile" />
      <input type="number" id="scoreAway" placeholder="Score extérieur" />

      <select id="status">
        <option value="upcoming">À venir</option>
        <option value="live">En cours</option>
        <option value="half">Mi-temps</option>
        <option value="done">Terminé</option>
      </select>

      <button onclick="saveMatch()">Enregistrer</button>
    </div>

    <div class="card">
      <h2>Ajouter un événement</h2>

      <select id="eventMatch"></select>

      <select id="eventType">
        <option value="goal">But</option>
        <option value="yellow">Carton Jaune</option>
        <option value="red">Carton Rouge</option>
        <option value="penalty">Penalty</option>
      </select>

      <input id="eventMinute" placeholder="Minute" />

      <input id="eventPlayer" placeholder="Nom du joueur" />

      <button onclick="addEvent()">Ajouter</button>
    </div>

    <div class="card">
      <h2>Nouveau Match</h2>

      <input id="newDay" type="date" />

      <select id="homeTeam"></select>

      <select id="awayTeam"></select>

      <input id="newTime" type="time" />

      <input id="field" placeholder="Terrain" />

      <button onclick="createMatch()">Créer Match</button>
    </div>

    <button id="logoutBtn">Déconnexion</button>

    <script type="module" src="assets/js/admin.js"></script>
  </body>
</html>
