<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Détail Match — Championnat Alisabieh 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <style>
    /* ─ Styles spécifiques à la page match ─ */
    .back-btn {
      background:transparent;
      border:1.5px solid rgba(0,158,219,0.4);
      color:var(--dj-blue);
      font-family:'Barlow Condensed',sans-serif;
      font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
      padding:8px 16px;border-radius:4px;cursor:pointer;
      transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
    }
    .back-btn:hover{background:var(--dj-blue);color:#fff;}

    .header-match-title{
      font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;
      letter-spacing:2px;text-transform:uppercase;color:var(--dj-sand);
    }

    .section-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;margin-top:32px;}
    .section-header:first-child{margin-top:0;}
    .section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,158,219,0.4),transparent);}
    .section-header h2{
      font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;
      letter-spacing:3px;text-transform:uppercase;color:var(--dj-blue);white-space:nowrap;
    }

    /* Classement */
    .standings-table{width:100%;border-collapse:collapse;background:var(--dj-card);border-radius:8px;overflow:hidden;border:1px solid rgba(0,158,219,0.15);}
    .standings-table thead th{background:var(--dj-dark);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);padding:10px 14px;text-align:center;}
    .standings-table thead th:first-child,.standings-table thead th:nth-child(2){text-align:left;}
    .standings-table tbody tr{border-top:1px solid rgba(0,158,219,0.08);transition:background 0.15s;}
    .standings-table tbody tr:hover{background:rgba(0,158,219,0.07);}
    .standings-table td{padding:11px 14px;font-size:14px;text-align:center;}
    .standings-table td:first-child,.standings-table td:nth-child(2){text-align:left;}
    .rank-num{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--text-dim);}
    .rank-num.rank-1{color:var(--dj-sand);}
    .rank-num.rank-2{color:#B0C4DE;}
    .rank-num.rank-3{color:#CD7F32;}
    .team-badge-sm{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;margin-right:8px;vertical-align:middle;border:1.5px solid rgba(255,255,255,0.1);}
    .pts-cell{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--dj-blue);}
    .diff-pos{color:#2ECC71;} .diff-neg{color:var(--dj-red);} .diff-zero{color:var(--text-dim);}

    /* Tops */
    .tops-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
    @media(max-width:700px){.tops-grid{grid-template-columns:1fr;}}
    .top-card{background:var(--dj-card);border:1px solid rgba(0,158,219,0.15);border-radius:8px;overflow:hidden;}
    .top-card-header{background:var(--dj-dark);padding:10px 14px;display:flex;align-items:center;gap:8px;}
    .top-card-icon{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;}
    .top-card-header h3{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
    .top-row{display:flex;align-items:center;padding:10px 14px;gap:10px;border-top:1px solid rgba(0,158,219,0.06);}
    .top-rank{font-family:'Oswald',sans-serif;font-size:12px;color:var(--text-dim);width:16px;text-align:center;}
    .top-player-name{flex:1;font-size:13px;font-weight:500;}
    .top-team-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:8px;font-weight:700;flex-shrink:0;}
    .top-value{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;min-width:50px;text-align:right;}

    /* Score hero */
    .match-score-hero{background:var(--dj-card);border:1px solid rgba(0,158,219,0.2);border-radius:10px;overflow:hidden;}
    .match-hero-top{background:var(--dj-dark);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;}
    .field-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);}
    .match-hero-body{padding:28px 20px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;}
    .hero-team{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;}
    .hero-team-badge{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;border:3px solid rgba(255,255,255,0.1);}
    .hero-team-name{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:1px;}
    .hero-score-center{text-align:center;}
    .hero-score-nums{font-family:'Oswald',sans-serif;font-size:56px;font-weight:700;letter-spacing:4px;line-height:1;display:flex;align-items:center;gap:10px;}
    .hero-score-sep{color:var(--text-dim);font-size:36px;}
    .hero-time-info{margin-top:8px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);}
    .events-list{padding:14px 20px;border-top:1px solid rgba(0,158,219,0.1);display:flex;flex-direction:column;gap:6px;}
    .event-row{display:flex;align-items:center;gap:10px;font-size:13px;padding:4px 0;}
    .event-min{font-family:'Oswald',sans-serif;font-size:12px;color:var(--text-dim);min-width:36px;text-align:right;}
    .event-icon{width:20px;text-align:center;}
    .event-label{flex:1;}
    .event-team{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text-dim);letter-spacing:0.5px;}

    /* Status badges */
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
    .badge-live{background:rgba(206,17,38,0.2);color:#FF4D6A;border:1px solid rgba(206,17,38,0.4);}
    .badge-half{background:rgba(200,169,110,0.2);color:var(--dj-sand);border:1px solid rgba(200,169,110,0.4);}
    .badge-done{background:rgba(58,80,112,0.4);color:var(--text-dim);border:1px solid rgba(58,80,112,0.6);}
    .badge-upcoming{background:rgba(0,122,61,0.15);color:#2ECC71;border:1px solid rgba(0,122,61,0.4);}
    .dot{width:6px;height:6px;background:var(--dj-red);border-radius:50%;animation:pulse 1.2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}

    @media(max-width:600px){
      .match-hero-body{grid-template-columns:1fr;text-align:center;}
      .hero-score-nums{font-size:40px;justify-content:center;}
      .tops-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<header>
  <div class="header-flag-bar"></div>
  <div class="header-inner">
    <a class="back-btn" href="index.html">← Retour</a>
    <span class="header-match-title">Championnat Alisabieh 2026 — Détail</span>
  </div>
</header>

<main class="main-content" id="app">
  <p style="color:var(--text-dim);text-align:center;padding:60px;font-size:14px">Chargement…</p>
</main>

<footer>
  <div class="footer-flag"></div>
  <p><strong>Championnat Alisabieh 2026</strong> &nbsp;·&nbsp; République de Djibouti</p>
</footer>

<script type="module" src="assets/js/match.js"></script>
</body>
</html>
